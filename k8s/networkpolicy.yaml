apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: simple-apache-site-netpol
spec:
  podSelector:
    matchLabels:
      app: simple-apache-site
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx  # Allow from ingress controller
        - podSelector:
            matchLabels:
              app: ingress-nginx  # Alternative if using different ingress
      ports:
        - protocol: TCP
          port: 80
    - from:
        - namespaceSelector: {}  # Allow from same namespace for internal access
      ports:
        - protocol: TCP
          port: 80