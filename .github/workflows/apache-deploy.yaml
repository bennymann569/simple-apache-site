name: Apache Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'public-html/**'

jobs:
  deploy:
    name: Deploy static site to Apache server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy site files to Apache server
        uses: appleboy/scp-action@v0.1.1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: 'public-html/*'
          target: '/var/www/html'
          recursive: true

      - name: Restart Apache service
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            sudo systemctl restart apache2 || sudo systemctl restart httpd

      - name: Post-deployment verification
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            sudo systemctl is-active --quiet apache2 || sudo systemctl is-active --quiet httpd
            ls -la /var/www/html | sed -n '1,20p'
            curl --fail --silent --show-error http://127.0.0.1/ | head -n 20

      - name: Notify on deployment failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "No notification webhook defined; skipping failure notification."
            exit 0
          fi
          payload="{\"text\":\"Deployment failed for ${GITHUB_REPOSITORY} on ${GITHUB_REF}. See ${RUN_URL}\"}"
          curl --fail --silent --show-error -X POST -H "Content-Type: application/json" -d "$payload" "$WEBHOOK_URL"